# AI-DLC Default Configuration
# このファイルはスターターキットのデフォルト値を定義します
# プロジェクトの docs/aidlc.toml で上書き可能です

[rules.squash]
enabled = false

[rules.feedback]
enabled = true

[rules.reviewing]
mode = "recommend"
tools = ["codex"]
exclude_patterns = []

[rules.worktree]
enabled = false

[rules.release]
changelog = false
version_tag = false

[rules.unit_branch]
enabled = false

[rules.depth_level]
level = "standard"
history_level = ""

[rules.automation]
mode = "manual"

[rules.construction]
max_retry = 3

[rules.linting]
markdown_lint = false

[rules.commit]
ai_author_auto_detect = true
ai_author = ""

[rules.cycle]
mode = "default"

[rules.version_check]
enabled = true

[rules.branch]
mode = "ask"

[rules.git]
commit_on_unit_complete = true
commit_on_phase_complete = true

[rules.documentation]
language = "日本語"
