# AI-DLC Default Configuration
# このファイルはスターターキットのデフォルト値を定義します
# プロジェクトの docs/aidlc.toml で上書き可能です

[rules.feedback]
enabled = true

[rules.reviewing]
mode = "recommend"
tools = ["codex"]
exclude_patterns = []

[rules.release]
changelog = false
version_tag = false

[rules.depth_level]
level = "standard"
history_level = ""

[rules.automation]
mode = "manual"

[rules.construction]
max_retry = 3

[rules.linting]
enabled = false
command = "npx markdownlint-cli2"

[rules.cycle]
mode = "default"
git_tracked = true

[rules.version_check]
enabled = true

[rules.git]
commit_on_unit_complete = true
commit_on_phase_complete = true
branch_mode = "ask"
unit_branch_enabled = false
squash_enabled = false
ai_author = ""
ai_author_auto_detect = true

[rules.documentation]
language = "日本語"
