# AI-DLC Default Configuration
# このファイルはスターターキットのデフォルト値を定義します
# プロジェクトの .aidlc/config.toml で上書き可能です

[rules.feedback]
enabled = true
# Issue 送信先 owner/repo（v2.5.0 で追加 / Unit 005 / #590）
# - mirror モードの retrospective Issue 送信先
# - フォーク利用や貢献先変更時のみ user-global で上書きする
# - 形式: <owner>/<repo>（正規表現: ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ / `/` はちょうど 1 個）
# - 不正値時は警告 + デフォルト（ikeisuke/ai-dlc-starter-kit）にフォールバック
upstream_repo = "ikeisuke/ai-dlc-starter-kit"

[rules.reviewing]
mode = "recommend"
# tools: 優先順位リスト = フォールバック順序。許容エントリは外部 CLI 名 / "self" / "claude"(alias)。
# review-routing.md §4 の暗黙末尾 self 補完シムにより、本デフォルト ["codex"] は実質
# ["codex", "self"] 相当として動作する（既存設定の後方互換性維持、Issue #611 / Unit 002）。
tools = ["codex"]
exclude_patterns = []
codex_bot_account = "chatgpt-codex-connector[bot]"

[rules.release]
changelog = false
version_tag = false

[rules.depth_level]
level = "standard"
history_level = ""

[rules.automation]
mode = "manual"

[rules.construction]
max_retry = 3

[rules.linting]
enabled = false
command = "npx markdownlint-cli2"

[rules.cycle]
mode = "default"
git_tracked = true

[rules.version_check]
enabled = true

[rules.git]
commit_on_unit_complete = true
commit_on_phase_complete = true
branch_mode = "ask"
unit_branch_enabled = false
squash_enabled = false
merge_method = "ask"
draft_pr = "ask"
ai_author = ""
ai_author_auto_detect = true

[rules.documentation]
language = "日本語"

[rules.github]
milestone_enabled = false

[rules.retrospective]
# 許容値: "silent"（自動生成 + ローカル記録のみ） / "mirror"（自動生成 + 下書き → 承認 → upstream Issue 起票）/ "disabled"（自動生成スキップ）
# mirror モードの実装は Unit 005 / 上限ガードは Unit 006 を参照
feedback_mode = "silent"
