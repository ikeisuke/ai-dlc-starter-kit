name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
    branches: [main]
    paths:
      - '**.md'
      - '**.toml'
      - '.markdownlint.json'
      - '.github/workflows/pr-check.yml'
      - 'bin/check-bash-substitution.sh'
      - 'bin/check-defaults-sync.sh'
      - 'version.txt'
      - 'skills/**/version.txt'

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            docs/translations/**/*.md
            prompts/**/*.md
            *.md

  bash-substitution-check:
    name: Bash Substitution Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bash code blocks for command substitution
        run: bash bin/check-bash-substitution.sh

  defaults-sync-check:
    name: Defaults TOML Sync Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check defaults.toml sync between aidlc and aidlc-setup
        run: bash bin/check-defaults-sync.sh
