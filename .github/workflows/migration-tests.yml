name: Migration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
    branches: [main]

permissions:
  contents: read

jobs:
  migration-tests:
    name: Migration Script Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Detect skip
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PATHS_REGEX: '^(skills/aidlc-migrate/scripts/migrate-.*\.sh|skills/aidlc-migrate/scripts/lib/.+|skills/aidlc-migrate/steps/.+|tests/migration/.+|tests/config-defaults/.+|tests/aidlc-setup/.+|tests/aidlc-migrate-prefs/.+|tests/retrospective/.+|tests/fixtures/v1-structure/.+|tests/fixtures/config-defaults/.+|tests/fixtures/aidlc-migrate-prefs/.+|tests/fixtures/retrospective/.+|skills/aidlc-setup/templates/config\.toml\.template|skills/aidlc-setup/steps/.+|skills/aidlc/config/defaults\.toml|skills/aidlc-setup/config/defaults\.toml|skills/aidlc/config/config\.toml\.example|skills/aidlc/config/retrospective-schema\.yml|skills/aidlc/scripts/retrospective-.*\.sh|skills/aidlc/scripts/lib/cycle-version-check\.sh|skills/aidlc/templates/retrospective_template\.md|skills/aidlc/steps/operations/04-completion\.md|\.github/workflows/migration-tests\.yml)$'
        run: |
          set -eu
          if [ "$PR_DRAFT" = "true" ]; then
            printf 'should_skip=true\n' >> "$GITHUB_OUTPUT"
            echo "Skip reason: Draft PR"
            exit 0
          fi
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' > "$RUNNER_TEMP/changed-files.txt"
          if grep -E "$PATHS_REGEX" "$RUNNER_TEMP/changed-files.txt" >/dev/null; then
            printf 'should_skip=false\n' >> "$GITHUB_OUTPUT"
            echo "Skip reason: none (paths matched)"
          else
            printf 'should_skip=true\n' >> "$GITHUB_OUTPUT"
            echo "Skip reason: paths not match"
          fi

      - name: Checkout
        if: steps.detect.outputs.should_skip != 'true'
        uses: actions/checkout@v4

      - name: Install bats-core
        if: steps.detect.outputs.should_skip != 'true'
        run: sudo npm install -g bats@1.11.1

      - name: Verify jq is available
        if: steps.detect.outputs.should_skip != 'true'
        run: jq --version

      - name: Install dasel v3
        if: steps.detect.outputs.should_skip != 'true'
        run: |
          set -eu
          curl -sSLo /tmp/dasel.gz https://github.com/tomwright/dasel/releases/latest/download/dasel_linux_amd64.gz
          gunzip /tmp/dasel.gz
          chmod +x /tmp/dasel
          sudo mv /tmp/dasel /usr/local/bin/dasel
          dasel query --help >/dev/null

      - name: Run migration tests
        if: steps.detect.outputs.should_skip != 'true'
        run: bats tests/migration/ tests/config-defaults/ tests/aidlc-setup/ tests/aidlc-migrate-prefs/ tests/retrospective/
