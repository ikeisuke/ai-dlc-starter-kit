name: Skill Reference Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'skills/**'
      - 'bin/check-skill-references.sh'
      - '.github/workflows/skill-reference-check.yml'

permissions:
  contents: read

jobs:
  skill-reference-check:
    name: Skill Reference Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check skill references for direct path violations
        run: bash bin/check-skill-references.sh
