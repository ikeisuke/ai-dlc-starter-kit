# AI-DLC Default Configuration
# このファイルはスターターキットのデフォルト値を定義します
# プロジェクトの docs/aidlc.toml で上書き可能です

[rules.squash]
enabled = false

[rules.jj]
enabled = false

[rules.feedback]
enabled = true

[rules.backlog]
mode = "git"

[rules.reviewing]
mode = "recommend"
tools = ["codex"]

[rules.worktree]
enabled = false

[rules.history]
level = "standard"

[rules.release]
changelog = false
version_tag = false

[rules.unit_branch]
enabled = false

[rules.linting]
markdown_lint = false

[rules.size_check]
enabled = true
max_bytes = 150000
max_lines = 1000
target_pattern = "*.md"

[rules.commit]
ai_author_auto_detect = true
ai_author = ""

[rules.branch]
mode = "ask"

[rules.git]
commit_on_unit_complete = true
commit_on_phase_complete = true

[rules.documentation]
language = "日本語"
