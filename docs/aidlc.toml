# AI-DLC プロジェクト設定
# 生成日: 2025-12-06

starter_kit_version = "1.21.1"

[project]
name = "ai-dlc-starter-kit"
type = "general"
description = "AI-DLC（AI-Driven Development Lifecycle）のスターターキット"

[project.tech_stack]
languages = ["Markdown"]
frameworks = []
tools = ["Claude Code"]

[paths]
setup_prompt = "prompts/setup-prompt.md"
aidlc_dir = "docs/aidlc"
cycles_dir = "docs/cycles"

[rules]
# 開発ルール

[rules.coding]
naming_convention = "lowerCamelCase"
# 追加のコーディングルールはここに記載

[rules.security]
validate_user_input = true
use_env_for_secrets = true

[rules.git]
# Git運用ルール
commit_on_unit_complete = true
commit_on_phase_complete = true

[rules.commit]
# コミット設定（v1.9.1で追加）
# ai_author: Co-Authored-By に使用するAI著者情報
# - 形式: "ツール名 <email>"（推奨）または任意の文字列
# - デフォルト: "Claude <noreply@anthropic.com>"
ai_author = "Claude <noreply@anthropic.com>"

[rules.documentation]
language = "日本語"

[rules.reviewing]
# AIレビュー設定
# mode: "recommend" | "required" | "disabled"
# - recommend: AIレビューツール利用可能時にレビューを推奨（デフォルト）
# - required: AIレビューツール利用可能時にレビュー必須
# - disabled: レビュー推奨を無効化
mode = "required"
# tools: AIレビューに使用するツールの優先順位リスト
# - デフォルト: ["codex"]
# - 例: ["codex", "claude", "gemini"]
# - リスト先頭を優先ツールヒントとしてスキルに渡す（最終選択はスキル内部の責務）
tools = ["codex"]
# exclude_patterns: レビュー対象から除外するファイルパターン（配列）
# - デフォルトパターン(.env*, *.key, *.pem, credentials.*, *secret*)は常に適用
# - ここに追加のパターンを指定可能
# exclude_patterns = ["*.p12", "config/secrets/**"]

[rules.automation]
# 自動化設定（v1.18.0で追加）
# mode: "manual" | "semi_auto"
# - manual: 従来どおりすべての承認ポイントでユーザー確認（デフォルト）
# - semi_auto: AIレビュー合格時にユーザー承認を省略し自動遷移
mode = "semi_auto"

[rules.custom]
# プロジェクト固有のカスタムルール
# 必要に応じて追記してください

[rules.branch]
# ブランチ作成方式設定（v1.21.2で追加）
# mode: "branch" | "worktree" | "ask"
# - branch: 常にブランチ方式で自動作成
# - worktree: 常にworktree方式で自動作成（rules.worktree.enabled=trueが必要）
# - ask: ユーザーに都度質問（デフォルト）
mode = "branch"

[rules.worktree]
# git worktree設定（v1.4.0で追加）
# enabled: true | false
# - true: サイクル開始時にworktreeの使用を提案する
# - false: 提案しない（デフォルト）
enabled = false

[rules.history]
# 履歴記録設定（v1.5.1で追加）
# level: "detailed" | "standard" | "minimal"
# - detailed: ステップ完了時に記録 + 修正差分も記録
# - standard: ステップ完了時に記録（デフォルト）
# - minimal: Unit完了時にまとめて記録
level = "standard"

[rules.release]
# リリース設定（v1.6.0で追加）
# changelog: true | false - CHANGELOG.md更新を行うか（デフォルト: false）
# version_tag: true | false - バージョンタグを付与するか（デフォルト: false）
changelog = true
version_tag = false

[rules.unit_branch]
# Unitブランチ設定（v1.7.0で追加）
# enabled: true | false - Unit開始時にUnitブランチ作成を提案するか（デフォルト: false）
enabled = false

[rules.linting]
# markdownlint設定（v1.8.0で追加）
# markdown_lint: true | false
# - true: markdownlint を実行する
# - false: markdownlint をスキップする（デフォルト）
markdown_lint = true

[rules.depth_level]
# 成果物詳細度設定（v1.19.0で追加）
# level: "minimal" | "standard" | "comprehensive"
# - minimal: シンプルなタスク向け（設計省略可、受け入れ基準簡略化）
# - standard: 通常の機能開発向け（デフォルト）
# - comprehensive: 複雑な機能開発向け（リスク分析・代替案検討等を追加）
level = "standard"

[rules.cycle]
# サイクルモード設定（v1.20.0で追加）
# mode: "default" | "named" | "ask"
# - default: 従来形式（docs/cycles/vX.X.X/）で動作（デフォルト）
# - named: 名前付きサイクル（docs/cycles/[name]/vX.X.X/）で動作
# - ask: Inception Phase開始時に名前付き/名前なしを選択
# mode = "default"

[rules.squash]
# squash設定（v1.15.0で追加）
# enabled: true | false - Unit完了時にsquashを提案するか（デフォルト: false）
# - true: Unit完了時にsquashステップを実行
# - false: squashステップをスキップ（従来の動作）
enabled = true

[rules.size_check]
# サイズチェック設定（v1.9.0で追加）
# enabled: true | false - サイズチェックを有効にするか（デフォルト: true）
# max_bytes: Integer - バイト数閾値（デフォルト: 150000）
# max_lines: Integer - 行数閾値（デフォルト: 1000）
# target_pattern: String - 対象ファイルパターン（デフォルト: "*.md"）
enabled = true
max_bytes = 150000
max_lines = 1000
target_pattern = "*.md"

[rules.feedback]
# フィードバック送信機能設定（v1.13.3で追加）
# enabled: true | false
# - true: フィードバック送信機能を有効化（デフォルト）
# - false: フィードバック送信機能を無効化（企業利用時のセキュリティ対策）
enabled = true

[rules.backlog]
# バックログ管理モード設定（v1.7.0で追加、v1.16.2で[backlog]から移動）
# mode: "git" | "issue" | "git-only" | "issue-only"
# - git: ローカルファイルに保存（従来方式、デフォルト）
# - issue: GitHub Issueに保存
# - git-only: ローカルファイルのみ（Issue作成禁止）
# - issue-only: GitHub Issueのみ（ローカルファイル作成禁止）
mode = "issue-only"
